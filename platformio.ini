; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; This repo has two example projects under examples/, both built from this one shared
; src_dir - see examples/CMakeLists.txt for how each env's sources are scoped:
;
; - examples/webJPEG (env: webJPEG) - MJPEG over WebSocket, plain Arduino framework.
; - examples/webH264 (env: webH264) - H.264 over WebSocket, needs Arduino built as an
;   ESP-IDF component (framework = arduino, espidf below) since esp_h264 ships as a
;   prebuilt IDF component - see examples/webH264/webH264.cpp for why.
;
; Both auto-detect the attached panel at boot, so they work across the whole
; T-Display-AMOLED lineup:
; https://www.lilygo.cc/products/t-display-amoled-lite
; https://www.lilygo.cc/products/t-display-s3-amoled
; https://www.lilygo.cc/products/t4-s3
src_dir = examples

;! Don't make changes
boards_dir = boards

[env]
lib_extra_dirs = ${PROJECT_DIR}
; lib_extra_dirs = ${PROJECT_DIR} makes LDF discover the whole repo root as a library,
; exposing src/LilyGo_AMOLED.h to every example.
lib_ignore =
    lib_deps
    examples
platform = espressif32@6.7.0
framework = arduino
upload_speed =  921600
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DDISABLE_ALL_LIBRARY_WARNINGS

    ; Enable -DARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; USB host example must disable usb cdc
    ; Enable -UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    ; -UARDUINO_USB_CDC_ON_BOOT
    -DCORE_DEBUG_LEVEL=1

monitor_filters =
	default
	esp32_exception_decoder

lib_deps =
    lvgl/lvgl @ 8.4.0
    lewisxhe/XPowersLib @ 0.2.7
    lewisxhe/SensorLib @ 0.2.4
    bodmer/TFT_eSPI @ 2.5.31
    FS
    SPIFFS
    SD
    esp32async/ESPAsyncWebServer @ ^3.9.2
    esp32async/AsyncTCP @ ^3.4.9
    bodmer/JPEGDecoder @ ^2.0.0

[env:webJPEG]
extends = env
board = T-Display-AMOLED
; ignore all code except the code in webJPEG/ (and of course the lib/lib_deps folder)
build_src_filter= -<*> +<webJPEG/>
build_flags =
    ${env.build_flags}

[env:webH264]
board = T-Display-AMOLED
; Overrides the board's default_16MB.csv (a small single-app slot meant for the plain
; Arduino/SCons examples) - this env's sdkconfig.defaults also sets
; CONFIG_PARTITION_TABLE_CUSTOM_FILENAME to the same file, but PlatformIO's own
; espressif32 platform independently derives a partition table from board_build.partitions
; for its own flashing-offset bookkeeping, and that one wins if the two disagree -
; without this, this example silently builds against a 1MB app partition instead of the
; roomy one esp_h264 + WiFi + display libs actually need (see partitions.webH264.csv).
board_build.partitions = partitions.webH264.csv
; This repo's own src/ (LilyGo_AMOLED fork) is compiled explicitly via
; examples/CMakeLists.txt instead (ESP-IDF/CMake needs every source file listed, unlike
; SCons's implicit lib_extra_dirs discovery). Ignore it here too, or LDF discovers and
; compiles it a second time under its folder name "src" - harmless (the linker drops
; the unreferenced duplicate) but a slower rebuild every time src/ changes.
lib_ignore = ${env.lib_ignore}
    src
; See examples/webH264/webH264.cpp for why this example needs Arduino built as an
; ESP-IDF component instead of the plain Arduino framework every other env here uses.
framework = arduino, espidf
; ESP-IDF/CMake ignores build_src_filter, so examples/CMakeLists.txt lists this
; example's files explicitly instead (see that file).
build_flags =
    ${env.build_flags}
; A minimal, explicit list rather than inheriting ${env.lib_deps} above: only what
; webH264.cpp and this repo's own src/ (see examples/CMakeLists.txt) need. lvgl is a
; partial exception - webH264.cpp doesn't use it, but src/LV_Helper.cpp does.
;
; Do not add xinyuan-lilygo/LilyGo-AMOLED-Series here. Under this builder each lib_deps
; entry becomes its own component, so that plus this repo's own src/ (via
; examples/CMakeLists.txt) would compile two divergent copies of LilyGo_AMOLED and
; silently link whichever one the linker resolves first - previously the unmodified
; upstream copy, not this repo's fork. See examples/CMakeLists.txt.

lib_deps =
    lewisxhe/XPowersLib @ 0.2.7
    lewisxhe/SensorLib @ 0.2.4
    bodmer/TFT_eSPI @ 2.5.31
    lvgl/lvgl @ 8.4.0
    FS
    SPIFFS
    SD
    esp32async/ESPAsyncWebServer @ ^3.9.2
    esp32async/AsyncTCP @ ^3.4.9

