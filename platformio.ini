; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; This repo contains two example projects, both living under examples/ and both built
; from this single, shared src_dir (rather than the PLATFORMIO_SRC_DIR-per-example trick
; this used to rely on - that only worked when something remembered to set the env var,
; e.g. CI's workflow script, and silently broke local `pio run -e webH264` / VSCode builds
; since neither sets it, letting the [env:webH264] build below quietly compile webJPEG.ino
; instead - see examples/CMakeLists.txt for how each env's sources are actually scoped):
;
; - examples/webJPEG (env: webJPEG) - MJPEG over WebSocket, plain Arduino
;   framework, auto-detects the attached panel at boot, so it works across the whole
;   T-Display-AMOLED lineup:
;   https://www.lilygo.cc/products/t-display-amoled-lite
;   https://www.lilygo.cc/products/t-display-s3-amoled
;   https://www.lilygo.cc/products/t4-s3
;
; - examples/webH264 (env: webH264) - H.264 over WebSocket via the browser's WebCodecs
;   API and Espressif's esp_h264 decoder on-device. T4-S3 only (fixed 600x450), and
;   needs Arduino built as an ESP-IDF component (framework = arduino, espidf below) since
;   esp_h264 ships as a prebuilt IDF component - see examples/webH264/webH264.cpp for why.
src_dir = examples

;! Don't make changes
boards_dir = boards

[env]
lib_extra_dirs = ${PROJECT_DIR}
; lib_extra_dirs = ${PROJECT_DIR} makes LDF discover the whole repo root as a library,
; exposing src/LilyGo_AMOLED.h to every example.
lib_ignore =
    lib_deps
    examples
platform = espressif32@6.7.0
framework = arduino
upload_speed =  921600
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DDISABLE_ALL_LIBRARY_WARNINGS

    ; Enable -DARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; USB host example must disable usb cdc
    ; Enable -UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    ; -UARDUINO_USB_CDC_ON_BOOT
    -DCORE_DEBUG_LEVEL=1

monitor_filters =
	default
	esp32_exception_decoder

lib_deps = 
    mikalhart/TinyGPSPlus @ 1.0.3
    adafruit/Adafruit NeoPixel @ 1.11.0
    bxparks/AceButton @ 1.10.1
    lvgl/lvgl @ 8.4.0
    lewisxhe/XPowersLib @ 0.2.7
    lewisxhe/SensorLib @ 0.2.4
    bodmer/TFT_eSPI @ 2.5.31
    FS
    SPIFFS
    SD
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    paulstoffregen/OneWire @ ^2.3.8
    esp32async/ESPAsyncWebServer @ ^3.9.2
    esp32async/AsyncTCP @ ^3.4.9
    bodmer/JPEGDecoder @ ^2.0.0

[env:webJPEG]
extends = env
board = T-Display-AMOLED
; ignore all code except the code in webJPEG/ (and of course the lib/lib_deps folder)
build_src_filter= -<*> +<webJPEG/>
build_flags =
    ${env.build_flags}

[env:webH264]
board = T-Display-AMOLED
; Overrides the board's default_16MB.csv (a small single-app slot meant for the plain
; Arduino/SCons examples) - this env's sdkconfig.defaults also sets
; CONFIG_PARTITION_TABLE_CUSTOM_FILENAME to the same file, but PlatformIO's own
; espressif32 platform independently derives a partition table from board_build.partitions
; for its own flashing-offset bookkeeping, and that one wins if the two disagree -
; without this, this example silently builds against a 1MB app partition instead of the
; roomy one esp_h264 + WiFi + display libs actually need (see partitions.webH264.csv).
board_build.partitions = partitions.webH264.csv
; See examples/webH264/webH264.cpp for why this example needs Arduino built as an
; ESP-IDF component instead of the plain Arduino framework every other env here uses.
framework = arduino, espidf
; The ESP-IDF/CMake builder ignores build_src_filter, so instead of filtering the
; shared src_dir, examples/CMakeLists.txt explicitly lists just this example's files
; (see that file). It's a no-op for [env:webJPEG], which never reads CMakeLists.txt.
build_flags =
    ${env.build_flags}
    ; Unrelated to this example: some sibling examples' dependencies (e.g.
    ; TinyGPSPlus) hit stringop-truncation warnings that plain Arduino/SCons
    ; treats as non-fatal but the stricter ESP-IDF/CMake builder used here
    ; treats as build-breaking errors. Harmless to keep even though this
    ; example's own minimal lib_deps below don't pull that library in.
    -Wno-stringop-truncation
; A minimal, explicit list rather than inheriting the full ${env.lib_deps} above:
; only what webH264.cpp itself needs, plus what the vendored src/ actually requires to
; compile under this builder. Deliberately excludes the other sibling examples'
; dependencies unrelated to that (JPEGDecoder, TinyGPSPlus, NeoPixel, AceButton,
; MAX3010x, OneWire), since libraries untested under this less common framework
; combination are a real risk here, not just dead weight.
;
; lvgl is a partial exception: webH264.cpp itself doesn't use it, but under the
; ESP-IDF/CMake builder used here, referencing src/LilyGo_AMOLED.h pulls in *all* of
; the vendored src/ as one library (unlike plain Arduino/SCons's per-file chain
; pruning) - including src/LV_Helper.cpp, which needs lvgl.h to compile at all.


lib_deps =
    lewisxhe/XPowersLib @ 0.2.7
    lewisxhe/SensorLib @ 0.2.4
    bodmer/TFT_eSPI @ 2.5.31
    lvgl/lvgl @ 8.4.0
    FS
    SPIFFS
    SD
    esp32async/ESPAsyncWebServer @ ^3.9.2
    esp32async/AsyncTCP @ ^3.4.9
    xinyuan-lilygo/LilyGo-AMOLED-Series @ ^1.2.3
    bodmer/JPEGDecoder @ ^2.0.0

