name: PlatformIO CI

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - "examples/**"
      - "src/**"
      - "boards/**"
      - "platformio.ini"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - "partitions.*.csv"
      - ".github/workflows/platformio.yml"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # env must match the PlatformIO environment that builds that example
      # (see platformio.ini).
      matrix:
        include:
          - example: examples/webJPEG
            env: webJPEG
          - example: examples/webH264
            env: webH264

    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ matrix.env }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run PlatformIO
        run: |
          export PLATFORMIO_SRC_DIR=${{ matrix.example }}
          pio run -e ${{ matrix.env }}
