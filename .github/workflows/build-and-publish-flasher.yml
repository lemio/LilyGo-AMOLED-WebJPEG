name: Build & publish flasher site

# Builds every environment in platformio.ini (webJPEG, webH264 - a bare `pio run`) and
# packages them plus a browser flashing UI into docs/, using the reusable Action from
# lemio/ESP32-S3-Flasher - see that repo's action/action.yml for what it does.
# Publishing docs/ itself (GitHub Pages source = docs/ on main) is a one-time manual
# setting in this repo's Settings > Pages.

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - 'boards/**'
      - 'platformio.ini'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
      - 'partitions.*.csv'
      - 'flasher-manifest.yml'
      - '.github/workflows/build-and-publish-flasher.yml'
  workflow_dispatch:

permissions:
  contents: write

# Queue overlapping runs instead of racing their pushes to docs/ - two runs both
# committing on top of the same checkout otherwise fight over the same ref (seen in
# esp32_PoweredUp in practice: the second push gets rejected with "fetch first" and its
# build is lost, since it only exists in that run's now-discarded workspace).
concurrency:
  group: publish-flasher-site
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: lemio/ESP32-S3-Flasher/action@main
        with:
          output-dir: docs

      # Both devices' own / routes redirect here (see webJPEG.cpp/webH264.cpp's
      # setupWebServer()) instead of serving the streaming page themselves:
      # getDisplayMedia()/getUserMedia() require a secure context, which plain
      # http:// on a LAN address/mDNS name isn't. One page serves both examples -
      # it detects which firmware is running via /boardinfo. Doesn't collide with
      # the Action's own docs/ output (index.html, wizard.html, config.js,
      # manifest.json, firmware/) - see its WEBAPP_ASSETS list.
      - name: Publish stream.html alongside the flasher site
        run: cp examples/stream.html docs/stream.html

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "Publish flasher site"
          # concurrency: above should prevent this, but retry with rebase as a fallback
          # in case main moved for any other reason (e.g. a push landing mid-run).
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected (attempt $i/5) - fetching and rebasing before retrying"
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push docs/ after 5 attempts" >&2
          exit 1
